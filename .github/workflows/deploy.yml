name: Build & Deploy Auth Service

on:
  push:
    branches:
      - dev
      - uat
      - prod

jobs:
  determine-version:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    outputs:
      version: ${{ steps.bump_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Get current version from the latest git tag
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git fetch origin 'refs/tags/*:refs/tags/*'

          TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)

          if [ -z "$TAG" ]; then
            TAG="v0.0.0"
          fi

          # Remove leading "v" for calculations
          TAG=${TAG#v}

          echo "TAG=$TAG"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Bump version
        id: bump_version
        run: |
          IFS='.' read -r -a VERSION_PARTS <<< "$TAG"

          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"

          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          while git tag -l "v$MAJOR.$MINOR.$PATCH" | grep -q .; do
            if [ "$GITHUB_REF_NAME" = "dev" ]; then
              PATCH=$((PATCH + 1))
            fi

            if [ "$GITHUB_REF_NAME" = "uat" ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            fi

            if [ "$GITHUB_REF_NAME" = "prod" ]; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            fi
          done

          VERSION="$MAJOR.$MINOR.$PATCH"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"

          echo "Generated version: v$VERSION"

      - name: Create and push release tag
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${GITHUB_REPOSITORY}.git

          git tag -a "v$VERSION" -m "Release v$VERSION"

          git push origin "v$VERSION"

  notify-monorepo:
    runs-on: ubuntu-latest
    needs: determine-version

    steps:
      - name: Checkout auth repo
        uses: actions/checkout@v4

      - name: Trigger monorepo build
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/temenb/game/dispatches \
            -d "{\"event_type\":\"service-updated\",\"client_payload\":{\"service\":\"${GITHUB_REPOSITORY}\",\"branch\":\"${GITHUB_REF_NAME}\",\"version\":\"${{ needs.determine-version.outputs.version }}\"}}"
          
