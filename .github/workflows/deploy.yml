name: Build & Deploy Auth Service

on:
  push:
    branches:
      - prod

jobs:
  notify-monorepo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout auth repo
        uses: actions/checkout@v4

      - name: Trigger monorepo build
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/temenb/game/dispatches \
            -d "{\"event_type\":\"service-updated\",\"client_payload\":{\"service\":\"${GITHUB_REPOSITORY}\",\"branch\":\"${GITHUB_REF_NAME}\"}}"


